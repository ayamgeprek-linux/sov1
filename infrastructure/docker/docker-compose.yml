# infrastructure/docker/docker-compose.yml
version: '3.8'

services:
  # ============================================================
  # POSTGRESQL DATABASE
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: stock-postgres
    environment:
      POSTGRES_USER: stockopname
      POSTGRES_PASSWORD: stockopname
      POSTGRES_DB: stockopname
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stock-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockopname"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # REDIS CACHE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: stock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stock-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # BACKEND API
  # ============================================================
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: stock-api
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://stockopname:stockopname@postgres:5432/stockopname
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - CORS_ORIGIN=http://localhost:3000,http://localhost:80
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stock-network
    restart: unless-stopped

  # ============================================================
  # FRONTEND WEB
  # ============================================================
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: stock-web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - stock-network
    restart: unless-stopped

  # ============================================================
  # NGNIX REVERSE PROXY (Optional)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: stock-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../apps/web/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - web
    networks:
      - stock-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  stock-network:
    driver: bridge